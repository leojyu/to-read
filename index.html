<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Read</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff; color: #1a1a1a; line-height: 1.8;
            padding: 40px 20px 60px; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        .container { max-width: 720px; width: 100%; }
        .site-title { font-size: 32px; font-weight: 400; letter-spacing: 1px; text-align: center; padding: 20px 0 8px; border-bottom: 1px solid #eee; margin-bottom: 28px; }
        .site-title span { font-weight: 300; color: #888; }
        .user-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; font-size: 14px; color: #888; margin-bottom: 10px; padding: 0 4px; flex-wrap: wrap; }
        .user-bar .user-name { color: #222; font-weight: 500; }
        .user-bar .user-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 14px; font-family: inherit; padding: 4px 8px; transition: 0.15s; }
        .user-bar .user-btn:hover { color: #222; }
        .user-bar .user-btn.logout { color: #c0392b; }
        .user-bar .user-btn.logout:hover { color: #a93226; }
        .user-bar .sync-status { font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 4px; }
        .user-bar .sync-status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; }
        .user-bar .sync-status .dot.offline { background: #e74c3c; }
        .user-bar .sync-status .dot.syncing { background: #f1c40f; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .tabs { display: flex; gap: 0; justify-content: center; border-bottom: 1px solid #eee; margin-bottom: 28px; padding-bottom: 2px; flex-wrap: wrap; }
        .tabs button { background: none; border: none; padding: 10px 28px; font-size: 16px; font-weight: 400; color: #888; cursor: pointer; transition: 0.15s; font-family: inherit; letter-spacing: 0.3px; position: relative; }
        .tabs button:hover { color: #222; }
        .tabs button.active { color: #222; font-weight: 500; }
        .tabs button.active::after { content: ''; position: absolute; bottom: -2px; left: 28px; right: 28px; height: 2px; background: #222; }
        .tab-content { display: none; animation: fade 0.2s ease; padding: 4px 0; }
        .tab-content.active { display: block; }
        @keyframes fade { 0% { opacity: 0.4; } 100% { opacity: 1; } }
        .book-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
        .book-card { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.1s; position: relative; }
        .book-card:hover { background: #f9f9f9; }
        .book-card .title { font-size: 18px; font-weight: 500; }
        .book-card .author { font-size: 14px; color: #888; margin-top: 1px; }
        .book-card .desc { font-size: 14px; color: #555; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .book-card .meta { font-size: 13px; color: #aaa; margin-top: 6px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .book-card .meta .delete-btn { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 13px; padding: 0 4px; font-family: inherit; transition: 0.15s; margin-left: auto; }
        .book-card .meta .delete-btn:hover { color: #a93226; text-decoration: underline; }
        .book-card .meta .owner-tag { font-size: 11px; color: #bbb; background: #f5f5f5; padding: 0 10px; border-radius: 10px; }
        .empty-state { text-align: center; padding: 48px 16px; color: #aaa; font-size: 15px; border: 1px dashed #eee; border-radius: 4px; margin-top: 10px; }
        .empty-state .icon { font-size: 32px; display: block; margin-bottom: 8px; }
        .auth-box { background: #fafafa; border: 1px solid #eee; border-radius: 4px; padding: 32px 28px; max-width: 380px; margin: 0 auto; }
        .auth-box h3 { font-weight: 500; font-size: 20px; margin-bottom: 4px; text-align: center; }
        .auth-box .sub { color: #888; font-size: 14px; text-align: center; margin-bottom: 20px; }
        .auth-box .form-group { margin-bottom: 14px; }
        .auth-box label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 3px; color: #333; }
        .auth-box input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; font-family: inherit; background: #fff; transition: 0.15s; }
        .auth-box input:focus { outline: none; border-color: #888; }
        .auth-box .btn { width: 100%; background: #222; border: none; color: #fff; padding: 8px 0; border-radius: 4px; font-size: 15px; cursor: pointer; transition: 0.15s; font-family: inherit; margin-top: 4px; }
        .auth-box .btn:hover { background: #444; }
        .auth-box .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .auth-box .switch-link { text-align: center; margin-top: 14px; font-size: 14px; color: #888; }
        .auth-box .switch-link button { background: none; border: none; color: #222; cursor: pointer; font-size: 14px; font-family: inherit; text-decoration: underline; padding: 0 4px; }
        .auth-box .switch-link button:hover { color: #000; }
        .auth-box .auth-msg { text-align: center; font-size: 14px; margin-top: 10px; color: #2c7a5a; }
        .auth-box .auth-msg.error { color: #c0392b; }
        .publish-form { padding: 4px 0; }
        .publish-form .form-group { margin-bottom: 16px; }
        .publish-form label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 3px; color: #333; }
        .publish-form input, .publish-form textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; font-family: inherit; background: #fff; transition: 0.15s; }
        .publish-form input:focus, .publish-form textarea:focus { outline: none; border-color: #888; }
        .publish-form textarea { min-height: 60px; resize: vertical; }
        .drop-zone { border: 2px dashed #ddd; border-radius: 4px; padding: 32px 20px; text-align: center; color: #aaa; transition: 0.2s; cursor: pointer; background: #fafafa; position: relative; }
        .drop-zone:hover { border-color: #bbb; background: #f7f7f7; }
        .drop-zone.dragover { border-color: #888; background: #f0f0f0; }
        .drop-zone .icon { font-size: 36px; display: block; margin-bottom: 6px; }
        .drop-zone .hint { font-size: 14px; }
        .drop-zone .file-name { font-size: 15px; color: #333; font-weight: 500; margin-top: 6px; }
        .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .preview-area { margin-top: 12px; border: 1px solid #eee; border-radius: 4px; padding: 12px 16px; max-height: 300px; overflow-y: auto; background: #fafafa; font-size: 14px; color: #444; white-space: pre-wrap; line-height: 1.8; display: none; }
        .preview-area.active { display: block; }
        .preview-area .label { font-size: 12px; color: #aaa; margin-bottom: 6px; letter-spacing: 0.5px; }
        .btn { background: #222; border: none; color: #fff; padding: 8px 28px; border-radius: 4px; font-size: 15px; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .btn:hover { background: #444; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid #ddd; color: #555; }
        .btn-outline:hover { background: #f5f5f5; border-color: #bbb; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
        #publishMsg { margin-top: 12px; font-size: 14px; color: #2c7a5a; }
        #publishMsg.error { color: #c0392b; }
        #reader-view { display: none; padding: 4px 0; }
        #reader-view.active { display: block; animation: fade 0.25s ease; }
        .reader-top { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid #eee; padding-bottom: 12px; margin-bottom: 20px; }
        .reader-top .b-title { font-size: 24px; font-weight: 500; }
        .reader-top .b-author { color: #888; font-size: 15px; margin-left: 6px; }
        .reader-top .back-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 14px; padding: 4px 8px; }
        .reader-top .back-btn:hover { color: #222; }
        .reader-top .fullscreen-hint { font-size: 12px; color: #ccc; margin-left: 8px; }
        .reader-body { font-size: 17px; line-height: 1.9; padding: 0 2px; white-space: pre-wrap; font-family: inherit; }
        .reader-body p { margin-bottom: 1.2em; text-indent: 2em; }
        .footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid #eee; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 12px 24px; font-size: 13px; color: #bbb; }
        .footer .sep { color: #ddd; }
        .footer a, .footer .data-btn { color: #888; text-decoration: none; cursor: pointer; background: none; border: none; font-size: 13px; font-family: inherit; padding: 0; transition: 0.15s; }
        .footer a:hover, .footer .data-btn:hover { color: #222; }
        .footer .data-btn.import-btn { position: relative; }
        .footer .data-btn.import-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

        /* ================================================================
           自定义模态框
           ================================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: modalFadeIn 0.2s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes modalFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 32px 36px 28px;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            animation: modalSlideUp 0.25s ease;
        }
        @keyframes modalSlideUp {
            0% { transform: translateY(20px) scale(0.96); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .modal-box .modal-icon {
            font-size: 36px;
            text-align: center;
            margin-bottom: 4px;
        }
        .modal-box .modal-title {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 4px;
        }
        .modal-box .modal-message {
            font-size: 15px;
            color: #555;
            text-align: center;
            line-height: 1.7;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .modal-box .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .modal-box .modal-actions button {
            padding: 8px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.15s;
            font-weight: 500;
        }
        .modal-box .modal-actions .btn-confirm {
            background: #222;
            color: #fff;
        }
        .modal-box .modal-actions .btn-confirm:hover { background: #444; }
        .modal-box .modal-actions .btn-cancel {
            background: #f0f0f0;
            color: #555;
        }
        .modal-box .modal-actions .btn-cancel:hover { background: #e0e0e0; }
        .modal-box .modal-actions .btn-primary {
            background: #222;
            color: #fff;
        }
        .modal-box .modal-actions .btn-primary:hover { background: #444; }
        /* 颜色主题 */
        .modal-box.type-info .modal-icon { color: #3498db; }
        .modal-box.type-success .modal-icon { color: #2ecc71; }
        .modal-box.type-error .modal-icon { color: #e74c3c; }
        .modal-box.type-warning .modal-icon { color: #f39c12; }
        .modal-box.type-info .modal-title { color: #2980b9; }
        .modal-box.type-success .modal-title { color: #27ae60; }
        .modal-box.type-error .modal-title { color: #c0392b; }
        .modal-box.type-warning .modal-title { color: #d68910; }

        @media (max-width: 480px) {
            body { padding: 20px 14px 40px; }
            .site-title { font-size: 26px; }
            .tabs button { padding: 8px 14px; font-size: 15px; }
            .tabs button.active::after { left: 14px; right: 14px; }
            .reader-top .b-title { font-size: 20px; }
            .reader-body { font-size: 16px; }
            .drop-zone { padding: 24px 16px; }
            .drop-zone .icon { font-size: 28px; }
            .reader-top .fullscreen-hint { display: none; }
            .footer { gap: 8px 16px; font-size: 12px; }
            .footer .sep { display: none; }
            .auth-box { padding: 24px 18px; }
            .user-bar { font-size: 13px; }
            .modal-box { padding: 24px 20px 20px; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="site-title">To-Read</div>

    <div class="user-bar" id="userBar">
        <span id="userDisplay">未登录</span>
        <button class="user-btn" id="loginBtn" style="display:none;">登录</button>
        <button class="user-btn logout" id="logoutBtn" style="display:none;">退出</button>
        <span class="sync-status" id="syncStatus">
            <span class="dot" id="syncDot"></span>
            <span id="syncLabel">已同步</span>
        </span>
    </div>

    <div class="tabs" id="tabNav">
        <button class="active" data-tab="recent">最近看过</button>
        <button data-tab="discover">发现</button>
        <button data-tab="publish">出版</button>
    </div>

    <div class="tab-content active" id="tab-recent">
        <div class="book-grid" id="recentGrid"></div>
    </div>

    <div class="tab-content" id="tab-discover">
        <div class="book-grid" id="discoverGrid"></div>
    </div>

    <div class="tab-content" id="tab-publish">
        <div id="publishContainer"></div>
    </div>

    <div id="reader-view">
        <div class="reader-top">
            <div>
                <span class="b-title" id="readerTitle">书名</span>
                <span class="b-author" id="readerAuthor">作者</span>
                <span class="fullscreen-hint">· 全屏模式</span>
            </div>
            <button class="back-btn" id="closeReaderBtn">← 关闭</button>
        </div>
        <div class="reader-body" id="readerBody"></div>
    </div>

    <footer class="footer">
        <span>数据存储在 JSONBin · 独立账号加密</span>
        <span class="sep">·</span>
        <button class="data-btn" id="exportBtn">导出数据</button>
        <span class="sep">·</span>
        <button class="data-btn import-btn" id="importBtnWrapper">
            导入数据
            <input type="file" id="importFileInput" accept=".json" />
        </button>
        <span class="sep">·</span>
        <a href="#" target="_blank">GitHub</a>
    </footer>
</div>

<!-- ================================================================
     自定义模态框 DOM
     ================================================================ -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
        <div class="modal-icon" id="modalIcon"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-message" id="modalMessage"></div>
        <div class="modal-actions" id="modalActions"></div>
    </div>
</div>

<script>
    // ================================================================
    //  1. 自定义模态框（替代 alert / confirm）
    // ================================================================
    const modalOverlay = document.getElementById('modalOverlay');
    const modalBox = document.getElementById('modalBox');
    const modalIcon = document.getElementById('modalIcon');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalActions = document.getElementById('modalActions');

    const ICONS = {
        info: 'ℹ️',
        success: '✅',
        error: '❌',
        warning: '⚠️',
        confirm: '❓'
    };

    function showModal(options) {
        return new Promise((resolve) => {
            const {
                title = '',
                message = '',
                type = 'info',      // info | success | error | warning | confirm
                confirmText = '确定',
                cancelText = '取消',
                showCancel = false
            } = options;

            // 设置内容
            modalIcon.textContent = ICONS[type] || 'ℹ️';
            modalTitle.textContent = title || (type === 'confirm' ? '确认' : '提示');
            modalMessage.textContent = message;

            // 清除旧样式
            modalBox.className = 'modal-box type-' + type;

            // 构建按钮
            modalActions.innerHTML = '';
            if (type === 'confirm') {
                // 确认框：两个按钮
                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'btn-confirm';
                confirmBtn.textContent = confirmText;
                confirmBtn.addEventListener('click', () => {
                    closeModal();
                    resolve(true);
                });
                modalActions.appendChild(confirmBtn);

                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'btn-cancel';
                cancelBtn.textContent = cancelText;
                cancelBtn.addEventListener('click', () => {
                    closeModal();
                    resolve(false);
                });
                modalActions.appendChild(cancelBtn);

                // 默认聚焦确认按钮
                setTimeout(() => confirmBtn.focus(), 50);
            } else {
                // 提示框：单个按钮
                const okBtn = document.createElement('button');
                okBtn.className = 'btn-primary';
                okBtn.textContent = confirmText;
                okBtn.addEventListener('click', () => {
                    closeModal();
                    resolve(true);
                });
                modalActions.appendChild(okBtn);
                setTimeout(() => okBtn.focus(), 50);
            }

            // 显示
            modalOverlay.classList.add('active');

            // 键盘事件
            const keyHandler = (e) => {
                if (e.key === 'Escape') {
                    if (type === 'confirm') {
                        closeModal();
                        resolve(false);
                    } else {
                        closeModal();
                        resolve(true);
                    }
                    document.removeEventListener('keydown', keyHandler);
                }
                if (e.key === 'Enter') {
                    const confirmBtn = modalActions.querySelector('.btn-confirm, .btn-primary');
                    if (confirmBtn) confirmBtn.click();
                }
            };
            document.addEventListener('keydown', keyHandler);

            // 点击外部关闭（仅对非 confirm 类型有效）
            if (type !== 'confirm') {
                modalOverlay.addEventListener('click', function outsideClick(e) {
                    if (e.target === modalOverlay) {
                        closeModal();
                        resolve(true);
                        modalOverlay.removeEventListener('click', outsideClick);
                        document.removeEventListener('keydown', keyHandler);
                    }
                });
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                document.removeEventListener('keydown', keyHandler);
            }
        });
    }

    // ================================================================
    //  2. 配置
    // ================================================================
    const BIN_ID = '6a5ada79f5f4af5e299f06e2';
    const ACCESS_KEY = '$2a$10$eD3inKr0MW42bBlQ4WTZWeefavoNb6LldqPVLFaOAbbbXKBUpqyVm';

    let cloudData = { books: [], users: {} };
    let currentUser = null;
    const SALT = 'ToRead_Salt_2026_!!';

    // ================================================================
    //  3. 工具函数
    // ================================================================
    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(SALT + password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/[&<>"]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }

    // ================================================================
    //  4. 云端读写
    // ================================================================
    async function fetchCloudData() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Access-Key': ACCESS_KEY }
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            const record = data.record || {};
            if (!record.books) record.books = [];
            if (!record.users) record.users = {};
            cloudData = record;
            localStorage.setItem('toread_cloud_cache', JSON.stringify(cloudData));
            return cloudData;
        } catch (e) {
            console.error('[错误] 读取云端失败:', e);
            const cached = localStorage.getItem('toread_cloud_cache');
            if (cached) {
                try {
                    const parsed = JSON.parse(cached);
                    if (parsed.books && parsed.users) {
                        cloudData = parsed;
                        return cloudData;
                    }
                } catch (e2) {}
            }
            cloudData = { books: [], users: {} };
            return cloudData;
        }
    }

    async function saveCloudData(data) {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Access-Key': ACCESS_KEY
                },
                body: JSON.stringify(data)
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            cloudData = data;
            localStorage.setItem('toread_cloud_cache', JSON.stringify(data));
            return true;
        } catch (e) {
            console.error('[错误] 保存云端失败:', e);
            throw e;
        }
    }

    // ================================================================
    //  5. 用户系统
    // ================================================================
    function getCurrentUser() {
        const saved = localStorage.getItem('toread_current_user');
        return saved ? JSON.parse(saved) : null;
    }

    function setCurrentUser(username) {
        if (username) {
            currentUser = username;
            localStorage.setItem('toread_current_user', JSON.stringify({ username }));
        } else {
            currentUser = null;
            localStorage.removeItem('toread_current_user');
        }
        updateUserBar();
        renderPublishTab();
        renderDiscover();
        renderRecent();
    }

    async function registerUser(username, password) {
        await fetchCloudData();
        if (cloudData.users[username]) {
            throw new Error('用户名已被占用，请换一个');
        }
        const hashed = await hashPassword(password);
        cloudData.users[username] = hashed;
        await saveCloudData(cloudData);
        setCurrentUser(username);
        return true;
    }

    async function loginUser(username, password) {
        await fetchCloudData();
        const storedHash = cloudData.users[username];
        if (!storedHash) {
            throw new Error('用户名不存在');
        }
        const inputHash = await hashPassword(password);
        if (storedHash !== inputHash) {
            throw new Error('密码错误');
        }
        setCurrentUser(username);
        return true;
    }

    function isLoggedIn() {
        return getCurrentUser() !== null;
    }

    function getUsername() {
        const user = getCurrentUser();
        return user ? user.username : null;
    }

    // ================================================================
    //  6. 书籍操作
    // ================================================================
    async function publishBook(bookData) {
        if (!isLoggedIn()) throw new Error('请先登录');
        await fetchCloudData();
        const newBook = {
            id: Date.now().toString(),
            title: bookData.title,
            author: bookData.author,
            desc: bookData.desc || '',
            content: bookData.content,
            owner: getUsername(),
            publishedAt: Date.now()
        };
        cloudData.books.unshift(newBook);
        await saveCloudData(cloudData);
        return newBook.id;
    }

    async function deleteBook(bookId) {
        if (!isLoggedIn()) throw new Error('请先登录');
        await fetchCloudData();
        const book = cloudData.books.find(b => b.id === bookId);
        if (!book) throw new Error('书籍不存在');
        if (book.owner !== getUsername()) throw new Error('您不是本书的所有者');
        cloudData.books = cloudData.books.filter(b => b.id !== bookId);
        await saveCloudData(cloudData);
        let recent = getRecent();
        recent = recent.filter(id => id !== bookId);
        saveRecent(recent);
    }

    // ================================================================
    //  7. 最近阅读
    // ================================================================
    const RECENT_KEY = 'toread_recent';

    function getRecent() {
        const data = localStorage.getItem(RECENT_KEY);
        return data ? JSON.parse(data) : [];
    }
    function saveRecent(recent) {
        localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
    }
    function addRecent(bookId) {
        let recent = getRecent();
        recent = recent.filter(id => id !== bookId);
        recent.unshift(bookId);
        if (recent.length > 20) recent = recent.slice(0, 20);
        saveRecent(recent);
    }

    // ================================================================
    //  8. 渲染函数
    // ================================================================
    function renderBookCard(book, clickHandler, showDelete) {
        const div = document.createElement('div');
        div.className = 'book-card';
        const wordCount = book.content ? book.content.length : 0;
        const isOwner = book.owner && book.owner === getUsername();
        const deleteHtml = (showDelete && isOwner) ?
            `<button class="delete-btn" data-id="${book.id}">删除</button>` :
            '';
        const ownerTag = book.owner ? `<span class="owner-tag">${escapeHtml(book.owner)}</span>` : '';

        div.innerHTML = `
            <div class="title">${escapeHtml(book.title)}</div>
            <div class="author">${escapeHtml(book.author)}</div>
            <div class="desc">${escapeHtml(book.desc || '（没有简介）')}</div>
            <div class="meta">
                <span>${wordCount > 0 ? Math.round(wordCount / 100) * 100 + '+' : 0} 字</span>
                <span>${book.publishedAt ? new Date(book.publishedAt).toLocaleDateString() : ''}</span>
                ${ownerTag}
                ${deleteHtml}
            </div>
        `;
        div.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-btn')) return;
            clickHandler(book);
        });

        const delBtn = div.querySelector('.delete-btn');
        if (delBtn) {
            delBtn.addEventListener('click', async function(e) {
                e.stopPropagation();
                const id = this.dataset.id;
                const confirmed = await showModal({
                    title: '确认删除',
                    message: `确定要删除《${book.title}》吗？此操作不可恢复。`,
                    type: 'confirm',
                    confirmText: '确认删除',
                    cancelText: '取消'
                });
                if (confirmed) {
                    try {
                        await deleteBook(id);
                        if (document.getElementById('reader-view').classList.contains('active') &&
                            currentBook && currentBook.id === id) {
                            closeReader();
                        }
                        renderDiscover();
                        renderRecent();
                    } catch (err) {
                        await showModal({
                            title: '删除失败',
                            message: err.message,
                            type: 'error'
                        });
                    }
                }
            });
        }
        return div;
    }

    async function renderDiscover() {
        const grid = document.getElementById('discoverGrid');
        await fetchCloudData();
        const books = cloudData.books || [];
        grid.innerHTML = '';
        if (books.length === 0) {
            grid.innerHTML =
                `<div class="empty-state"><span class="icon">·</span>书库还是空的<br />去「出版」上传你的第一本小说</div>`;
            return;
        }
        const loggedIn = isLoggedIn();
        books.forEach(book => {
            grid.appendChild(renderBookCard(book, (b) => openReader(b), loggedIn));
        });
        document.getElementById('syncLabel').textContent = '已同步';
        document.getElementById('syncDot').className = 'dot online';
    }

    async function renderRecent() {
        const grid = document.getElementById('recentGrid');
        const recentIds = getRecent();
        await fetchCloudData();
        const books = cloudData.books || [];
        const recentBooks = recentIds.map(id => books.find(b => b.id === id)).filter(Boolean);
        grid.innerHTML = '';
        if (recentBooks.length === 0) {
            grid.innerHTML =
                `<div class="empty-state"><span class="icon">·</span>还没有阅读记录<br />去「发现」找一本书开始读</div>`;
            return;
        }
        const loggedIn = isLoggedIn();
        recentBooks.forEach(book => {
            grid.appendChild(renderBookCard(book, (b) => openReader(b), loggedIn));
        });
    }

    // ================================================================
    //  9. 阅读器
    // ================================================================
    let currentBook = null;

    function renderReaderContent(book) {
        const body = document.getElementById('readerBody');
        if (book.content) {
            const lines = book.content.split('\n');
            let html = '';
            let inPara = false;
            for (let line of lines) {
                const trimmed = line.trim();
                if (trimmed === '') {
                    if (inPara) { html += '</p>'; inPara = false; }
                    html += '<br />';
                } else {
                    if (!inPara) { html += '<p>'; inPara = true; } else { html += ' '; }
                    html += escapeHtml(trimmed);
                }
            }
            if (inPara) html += '</p>';
            body.innerHTML = html;
        } else {
            body.innerHTML = '<p>（本书暂无正文）</p>';
        }
    }

    function openReader(book) {
        addRecent(book.id);
        document.getElementById('reader-view').classList.add('active');
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));

        currentBook = book;
        document.getElementById('readerTitle').textContent = book.title;
        document.getElementById('readerAuthor').textContent = book.author;
        renderReaderContent(book);
        requestFullscreen();
    }

    function closeReader() {
        document.getElementById('reader-view').classList.remove('active');
        exitFullscreen();
        const activeTab = document.querySelector('.tabs .active');
        if (activeTab) {
            document.getElementById('tab-' + activeTab.dataset.tab).classList.add('active');
        } else {
            document.getElementById('tab-recent').classList.add('active');
        }
        renderDiscover();
        renderRecent();
        currentBook = null;
    }

    document.getElementById('closeReaderBtn').addEventListener('click', closeReader);
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            if (document.getElementById('reader-view').classList.contains('active')) {
                if (!isFullscreen()) {
                    closeReader();
                }
            }
        }
    });

    // ================================================================
    //  10. 全屏
    // ================================================================
    function requestFullscreen() {
        const el = document.documentElement;
        if (el.requestFullscreen) { el.requestFullscreen().catch(() => {}); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }
    function exitFullscreen() {
        if (document.exitFullscreen) { document.exitFullscreen().catch(() => {}); }
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        else if (document.mozCancelFullScreen) { document.mozCancelFullScreen(); }
        else if (document.msExitFullscreen) { document.msExitFullscreen(); }
    }
    function isFullscreen() {
        return !!(document.fullscreenElement || document.webkitFullscreenElement ||
            document.mozFullScreenElement || document.msFullscreenElement);
    }

    // ================================================================
    //  12. 认证事件
    // ================================================================
    let authMode = 'login';

    function bindAuthEvents() {
        const actionBtn = document.getElementById('authActionBtn');
        const switchBtn = document.getElementById('authSwitchBtn');
        const msg = document.getElementById('authMsg');
        const title = document.getElementById('authTitle');
        const sub = document.getElementById('authSub');
        const switchText = document.getElementById('authSwitchText');

        if (!actionBtn) return;

        function updateUI() {
            if (authMode === 'login') {
                title.textContent = '登录';
                sub.textContent = '输入账号密码登录';
                actionBtn.textContent = '登录';
                switchText.textContent = '还没有账号？';
                switchBtn.textContent = '注册';
            } else {
                title.textContent = '注册';
                sub.textContent = '创建新账号，密码至少4位';
                actionBtn.textContent = '注册';
                switchText.textContent = '已有账号？';
                switchBtn.textContent = '去登录';
            }
            msg.textContent = '';
            msg.className = 'auth-msg';
        }
        updateUI();

        async function doAuth() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            if (!username || !password) {
                msg.textContent = '请填写用户名和密码';
                msg.className = 'auth-msg error';
                return;
            }
            if (password.length < 4) {
                msg.textContent = '密码至少4位';
                msg.className = 'auth-msg error';
                return;
            }

            msg.textContent = '处理中…';
            msg.className = 'auth-msg';
            actionBtn.disabled = true;

            try {
                if (authMode === 'login') {
                    await loginUser(username, password);
                    msg.textContent = '[成功] 登录成功！';
                    msg.className = 'auth-msg';
                } else {
                    await registerUser(username, password);
                    msg.textContent = '[成功] 注册成功，已自动登录！';
                    msg.className = 'auth-msg';
                }
                switchTab('publish');
            } catch (err) {
                msg.textContent = '[错误] ' + err.message;
                msg.className = 'auth-msg error';
            } finally {
                actionBtn.disabled = false;
            }
        }

        actionBtn.addEventListener('click', doAuth);
        document.getElementById('authPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doAuth();
        });
        document.getElementById('authUsername').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doAuth();
        });

        switchBtn.addEventListener('click', function() {
            authMode = (authMode === 'login') ? 'register' : 'login';
            updateUI();
            document.getElementById('authMsg').textContent = '';
            document.getElementById('authMsg').className = 'auth-msg';
        });
    }

    // ================================================================
    //  13. 出版表单事件
    // ================================================================
    let uploadedContent = '';
    let uploadedFileName = '';

    function bindPublishEvents() {
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const previewArea = document.getElementById('previewArea');
        const previewContent = document.getElementById('previewContent');

        if (!dropZone) return;

        function handleFile(file) {
            if (!file || !file.name.endsWith('.txt')) {
                showModal({
                    title: '文件格式错误',
                    message: '请上传 .txt 格式的文件',
                    type: 'warning'
                });
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedContent = e.target.result;
                uploadedFileName = file.name;
                fileName.textContent = '[√] ' + file.name + '（' + uploadedContent.length + ' 字）';
                const preview = uploadedContent.slice(0, 500) + (uploadedContent.length > 500 ? '……' : '');
                previewContent.textContent = preview;
                previewArea.classList.add('active');
                document.getElementById('publishMsg').textContent = '';
                saveDraft();
            };
            reader.readAsText(file, 'UTF-8');
        }

        fileInput.addEventListener('change', function(e) {
            if (this.files.length > 0) {
                handleFile(this.files[0]);
            }
        });

        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        document.getElementById('publishBtn').addEventListener('click', async function() {
            const title = document.getElementById('pubTitle').value.trim();
            const author = document.getElementById('pubAuthor').value.trim();
            const desc = document.getElementById('pubDesc').value.trim();
            const msg = document.getElementById('publishMsg');

            if (!title || !author) {
                msg.textContent = '请填写书名和作者';
                msg.className = 'error';
                return;
            }
            if (!uploadedContent) {
                msg.textContent = '请上传小说的 .txt 文件';
                msg.className = 'error';
                return;
            }

            try {
                this.disabled = true;
                msg.textContent = '出版中…';
                msg.className = '';

                await publishBook({ title, author, desc, content: uploadedContent });

                document.getElementById('pubTitle').value = '';
                document.getElementById('pubAuthor').value = '';
                document.getElementById('pubDesc').value = '';
                uploadedContent = '';
                uploadedFileName = '';
                fileName.textContent = '';
                previewArea.classList.remove('active');
                previewContent.textContent = '';
                fileInput.value = '';
                localStorage.removeItem('toread_draft');

                msg.textContent = '[成功] 出版成功！书已同步到云端，所有人可见';
                msg.className = '';

                renderDiscover();
                renderRecent();
                switchTab('discover');
            } catch (err) {
                msg.textContent = '[错误] 出版失败: ' + err.message;
                msg.className = 'error';
            } finally {
                this.disabled = false;
            }
        });

        document.getElementById('clearFormBtn').addEventListener('click', async function() {
            const confirmed = await showModal({
                title: '确认清空',
                message: '确定清空所有已填内容？',
                type: 'confirm',
                confirmText: '清空',
                cancelText: '取消'
            });
            if (confirmed) {
                document.getElementById('pubTitle').value = '';
                document.getElementById('pubAuthor').value = '';
                document.getElementById('pubDesc').value = '';
                uploadedContent = '';
                uploadedFileName = '';
                fileName.textContent = '';
                previewArea.classList.remove('active');
                previewContent.textContent = '';
                fileInput.value = '';
                document.getElementById('publishMsg').textContent = '';
                document.getElementById('publishMsg').className = '';
                localStorage.removeItem('toread_draft');
            }
        });
    }

    // ================================================================
    //  14. 草稿
    // ================================================================
    function saveDraft() {
        if (!isLoggedIn()) return;
        const titleEl = document.getElementById('pubTitle');
        const authorEl = document.getElementById('pubAuthor');
        const descEl = document.getElementById('pubDesc');
        const draft = {
            title: titleEl ? titleEl.value : '',
            author: authorEl ? authorEl.value : '',
            desc: descEl ? descEl.value : '',
            fileName: uploadedFileName,
            content: uploadedContent
        };
        try {
            localStorage.setItem('toread_draft', JSON.stringify(draft));
        } catch (e) {}
    }

    function loadDraft() {
        if (!isLoggedIn()) return;
        try {
            const raw = localStorage.getItem('toread_draft');
            if (!raw) return;
            const draft = JSON.parse(raw);
            const titleEl = document.getElementById('pubTitle');
            const authorEl = document.getElementById('pubAuthor');
            const descEl = document.getElementById('pubDesc');
            if (titleEl && draft.title) titleEl.value = draft.title;
            if (authorEl && draft.author) authorEl.value = draft.author;
            if (descEl && draft.desc) descEl.value = draft.desc;
            if (draft.content) {
                uploadedContent = draft.content;
                uploadedFileName = draft.fileName || '草稿.txt';
                const fn = document.getElementById('fileName');
                const pa = document.getElementById('previewArea');
                const pc = document.getElementById('previewContent');
                if (fn) fn.textContent = '[√] ' + uploadedFileName + '（' + uploadedContent.length + ' 字）';
                if (pc) {
                    const preview = uploadedContent.slice(0, 500) + (uploadedContent.length > 500 ? '……' : '');
                    pc.textContent = preview;
                }
                if (pa) pa.classList.add('active');
            }
        } catch (e) {}
    }

    document.addEventListener('input', function(e) {
        if (e.target.closest('#publishContainer') && isLoggedIn()) {
            saveDraft();
        }
    });

    // ================================================================

    // ================================================================
    document.getElementById('exportBtn').addEventListener('click', async function() {
        await fetchCloudData();
        const data = {
            version: '2.0',
            exportedAt: new Date().toISOString(),
            books: cloudData.books,
            users: cloudData.users
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'toread_data.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });

    document.getElementById('importFileInput').addEventListener('change', function(e) {
        if (this.files.length === 0) return;
        const file = this.files[0];
        const reader = new FileReader();
        reader.onload = async function(ev) {
            try {
                const data = JSON.parse(ev.target.result);
                if (!data.books || !Array.isArray(data.books)) {
                    await showModal({
                        title: '导入失败',
                        message: '无效的数据文件：缺少 books 数组',
                        type: 'error'
                    });
                    return;
                }
                if (!data.users) data.users = {};
                const confirmed = await showModal({
                    title: '确认导入',
                    message: `将导入 ${data.books.length} 本书 和 ${Object.keys(data.users).length} 个用户到云端。\n\n是否继续？`,
                    type: 'confirm',
                    confirmText: '导入',
                    cancelText: '取消'
                });
                if (confirmed) {
                    await saveCloudData({ books: data.books, users: data.users });
                    renderDiscover();
                    renderRecent();
                    await showModal({
                        title: '导入成功',
                        message: `成功导入 ${data.books.length} 本书！`,
                        type: 'success'
                    });
                }
            } catch (err) {
                await showModal({
                    title: '导入失败',
                    message: err.message,
                    type: 'error'
                });
            }
        };
        reader.readAsText(file);
        this.value = '';
    });

    // ================================================================
    //  16. Tab 切换
    // ================================================================
    function switchTab(tabId) {
        if (document.getElementById('reader-view').classList.contains('active')) {
            closeReader();
            setTimeout(() => doSwitch(tabId), 100);
        } else {
            doSwitch(tabId);
        }
    }

    function doSwitch(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        document.querySelector(`.tabs button[data-tab="${tabId}"]`).classList.add('active');
        if (tabId === 'publish') {
            renderPublishTab();
        } else if (tabId === 'discover') {
            renderDiscover();
        } else if (tabId === 'recent') {
            renderRecent();
        }
    }

    document.querySelectorAll('.tabs button').forEach(btn => {
        btn.addEventListener('click', function() {
            const tabId = this.dataset.tab;
            switchTab(tabId);
        });
    });

    // ================================================================
    //  17. 用户栏更新
    // ================================================================
    function updateUserBar() {
        const display = document.getElementById('userDisplay');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        if (isLoggedIn()) {
            display.innerHTML = '[用户] <span class="user-name">' + escapeHtml(getUsername()) + '</span>';
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'inline';
        } else {
            display.textContent = '未登录';
            loginBtn.style.display = 'inline';
            logoutBtn.style.display = 'none';
        }
    }

    document.getElementById('loginBtn').addEventListener('click', function() {
        switchTab('publish');
    });

    document.getElementById('logoutBtn').addEventListener('click', async function() {
        const confirmed = await showModal({
            title: '确认退出',
            message: '确定退出登录？',
            type: 'confirm',
            confirmText: '退出',
            cancelText: '取消'
        });
        if (confirmed) {
            setCurrentUser(null);
            updateUserBar();
            renderPublishTab();
            renderDiscover();
            renderRecent();
            if (document.getElementById('reader-view').classList.contains('active')) {
                closeReader();
            }
            switchTab('recent');
        }
    });

    // ================================================================
    //  18. 初始化
    // ================================================================
    const savedUser = getCurrentUser();
    if (savedUser) currentUser = savedUser.username;

    updateUserBar();
    fetchCloudData().then(() => {
        renderDiscover();
        renderRecent();
        renderPublishTab();
        doSwitch('recent');
        if (isLoggedIn()) {
            setTimeout(loadDraft, 200);
        }
    }).catch(() => {
        renderDiscover();
        renderRecent();
        renderPublishTab();
        doSwitch('recent');
    });

    console.log('[系统] To-Read 已启动，独立账号加密');
    console.log('[注意] 密码使用 SHA-256 加密存储，请保管好你的 ACCESS_KEY');
</script>
